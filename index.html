<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/A-C-Admin/" />
    <title>Admin Dashboard - Orders</title>
    <link rel="stylesheet" href="admin.css" />
</head>

<body>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>📋 Order Management Dashboard</h1>
        <button id="logoutBtn" style="padding:4px 10px;">Logout</button>
    </div>
    <div style="margin-bottom: 20px;">
        <button id="manageProductsBtn">🏷️ Manage Cosmetic Products</button>
    </div>

    <div class="export">
        <button id="exportBtn">⬇ Export to Excel</button>
        <div class="toggle-bar">
            <input type="checkbox" id="whatsappToggle" checked>
            Send WhatsApp message before changing status.
        </div>



        <!-- ================= PENDING ================= -->
        <section>
            <h2>🟡 Pending Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Item</th>
                        <th>Order Note</th>
                        <th>Date</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pendingList"></tbody>
            </table>
        </section>

        <!-- ================= ACCEPTED ================= -->
        <section>
            <h2>🟢 Accepted Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Item</th>
                        <th>Order Note</th>
                        <th>Date</th>
                        <th>Phone</th>
                    </tr>
                </thead>
                <tbody id="acceptedList"></tbody>
            </table>
        </section>

        <!-- ================= REJECTED ================= -->
        <section>
            <h2>🔴 Rejected Orders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Item</th>
                        <th>Order Note</th>
                        <th>Date</th>
                        <th>Phone</th>
                    </tr>
                </thead>
                <tbody id="rejectedList"></tbody>
            </table>
        </section>

        <script src="auth-guard.js"></script>
        <script src="admin.js"></script>
</body>
        <script>
            // Handle Manage Products button click
            document.addEventListener('DOMContentLoaded', () => {
                const manageProductsBtn = document.getElementById('manageProductsBtn');
                if (manageProductsBtn) {
                    manageProductsBtn.addEventListener('click', () => {
                        location.href = 'products.html';
                    });
                }
            });
        </script>

</html>
