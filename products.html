<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Management</title>
    <link rel="stylesheet" href="admin.css" />
</head>

<body>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>📦 Product Management</h1>
        <button id="logoutBtn" style="padding:4px 10px;">Logout</button>
    </div>
    <p><a href="index.html">⬅ Back to Orders</a></p>

    <section>
        <form id="productForm">
            <div style="display:flex; flex-wrap:wrap; gap:12px; max-width:800px; align-items:center;">
                <input type="hidden" id="prodId" />
                <input type="text" id="prodName" placeholder="Product Name" required />
                <input type="text" id="prodQtyType" placeholder="Quantity Type (e.g. Kg, pcs)" />
                <select id="prodCategory" aria-label="Product Category">
                    <option value="">Select Category (optional)</option>
                    <optgroup label="Face & Skin">
                        <option value="Skincare">Skincare</option>
                        <option value="Sun Care">Sun Care</option>
                        <option value="Eye Care">Eye Care</option>
                        <option value="Lip Care">Lip Care</option>
                    </optgroup>
                    <optgroup label="Beauty & Styling">
                        <option value="Makeup">Makeup</option>
                        <option value="Hair Care">Hair Care</option>
                        <option value="Nail Care">Nail Care</option>
                        <option value="Beauty Tools & Accessories">Beauty Tools &amp; Accessories</option>
                    </optgroup>
                    <optgroup label="Body & Fragrance">
                        <option value="Body Care">Body Care</option>
                        <option value="Bath & Shower">Bath &amp; Shower</option>
                        <option value="Hand & Foot Care">Hand &amp; Foot Care</option>
                        <option value="Fragrance">Fragrance</option>
                    </optgroup>
                    <optgroup label="Special Collections">
                        <option value="Men's Grooming">Men&#39;s Grooming</option>
                        <option value="Personal Hygiene">Personal Hygiene</option>
                        <option value="Natural & Organic">Natural &amp; Organic</option>
                        <option value="Gift Sets & Combos">Gift Sets &amp; Combos</option>
                    </optgroup>
                </select>
                <input type="number" id="prodPrice" placeholder="Price" required />
                <input type="number" id="prodDiscount" placeholder="Discount amount (optional)" />
                <input type="text" id="prodDetails" placeholder="Details / offer text" />
                <label style="display:flex; align-items:center; gap:6px;">
                    <input type="checkbox" id="prodPublished" checked /> Published
                </label>
                <div class="image-picker-actions" style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                    <button type="button" id="captureImageBtn">Capture Photo</button>
                    <button type="button" id="uploadImageBtn">Upload from Gallery</button>
                    <input type="file" id="prodFileCapture" accept="image/*" capture="environment" style="display:none;" />
                    <input type="file" id="prodFileUpload" accept="image/*" style="display:none;" />
                </div>
                <input type="hidden" id="prodImg" />
                <img id="prodPreview" alt="Preview" style="max-width:120px; max-height:120px; object-fit:cover; display:none;" />
                <button type="submit" id="productSubmitBtn">Add Product</button>
                <button type="button" id="cancelEdit" style="display:none;">Cancel</button>
            </div>
        </form>
    </section>

    <section>
        <div class="product-toolbar">
            <input type="text" id="productSearch" placeholder="Search products by name" />
            <select id="categoryFilter" aria-label="Filter by category">
                <option value="">All Categories</option>
                <option value="Skincare">Skincare</option>
                <option value="Sun Care">Sun Care</option>
                <option value="Eye Care">Eye Care</option>
                <option value="Lip Care">Lip Care</option>
                <option value="Makeup">Makeup</option>
                <option value="Hair Care">Hair Care</option>
                <option value="Nail Care">Nail Care</option>
                <option value="Beauty Tools & Accessories">Beauty Tools &amp; Accessories</option>
                <option value="Body Care">Body Care</option>
                <option value="Bath & Shower">Bath &amp; Shower</option>
                <option value="Hand & Foot Care">Hand &amp; Foot Care</option>
                <option value="Fragrance">Fragrance</option>
                <option value="Men's Grooming">Men&#39;s Grooming</option>
                <option value="Personal Hygiene">Personal Hygiene</option>
                <option value="Natural & Organic">Natural &amp; Organic</option>
                <option value="Gift Sets & Combos">Gift Sets &amp; Combos</option>
            </select>
        </div>
        <p id="productCount" style="margin-top:0; margin-bottom:10px;">Showing 0 products</p>

        <h2>Published Products</h2>
        <table id="publishedTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Qty Type</th>
                    <th>Category</th>
                    <th>Price ₹</th>
                    <th>Discount ₹</th>
                    <th>Details</th>
                    <th>Image</th>
                    <th>Published</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h2>Unpublished Products</h2>
        <table id="unpublishedTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Qty Type</th>
                    <th>Category</th>
                    <th>Price ₹</th>
                    <th>Discount ₹</th>
                    <th>Details</th>
                    <th>Image</th>
                    <th>Published</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="auth-guard.js"></script>
    <script src="products.js"></script>
</body>

</html>
